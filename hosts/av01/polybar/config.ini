[colors]
background = #1a1b26
foreground = #a9b1d6
primary = #7aa2f7
alert = #f7768e

[bar/example]
width = 100%
height = 30pt
radius = 0
background = ${colors.background}
foreground = ${colors.foreground}
line-size = 2pt
padding-left = 1
padding-right = 1
module-margin = 0
separator = |
separator-foreground = #414868

#font-0 = "monospace:size=10;2"
#font-1 = "Font Awesome 6 Free:style=Solid:size=10;2"

font-0 = "JetBrains Mono Nerd Font:size=10;2"
font-1 = "Font Awesome 5 Free:style=Solid:size=10;2"
font-2 = "Font Awesome 5 Free:style=Regular:size=10;2"
font-3 = "Font Awesome 5 Brands:style=Regular:size=10;2"

modules-left = i3
modules-center = xwindow
modules-right = filesystem cpu cpu-temp memory battery date pulseaudio suspend

# System Tray for Network and Bluetooth applets
tray-position = right
tray-padding = 2
tray-maxsize = 16

cursor-click = pointer
enable-ipc = true

#[module/xworkspaces]
#type = internal/xworkspaces
#label-active = %name%
#label-active-background = #3b4261
#label-active-underline= ${colors.primary}
#label-active-padding = 1
#label-occupied = %name%
#label-occupied-padding = 1
#label-urgent = %name%
#label-urgent-background = ${colors.alert}
#label-urgent-padding = 1
#label-empty = %name%
#label-empty-foreground = #565f89
#label-empty-padding = 1

[module/i3]
type = internal/i3
pin-workspaces = false

# Monitor 1 Active (Focused)
label-focused = %name%
label-focused-background = #3b4261
label-focused-underline = ${colors.primary}
label-focused-padding = 1

# Monitor 2 Active (Visible but unfocused)
label-visible = %name%
label-visible-background = #292e42
label-visible-underline = #ff9e64
label-visible-padding = 1

# All Inactive Workspaces (Unfocused but occupied)
label-unfocused = %name%
label-unfocused-foreground = ${colors.foreground}
label-unfocused-padding = 1

# Workspaces with urgent notifications
label-urgent = %name%
label-urgent-background = ${colors.alert}
label-urgent-padding = 1

[module/xwindow]
type = internal/xwindow
label = %title:0:40:...%

#[module/cpu]
#type = internal/cpu
#interval = 2
#format-prefix = "CPU "
#format-prefix-foreground = ${colors.primary}
#label = %percentage:2%%

#[module/memory]
#type = internal/memory
#interval = 2
#format-prefix = "RAM "
#format-prefix-foreground = ${colors.primary}
#label = %percentage_used:2%%

#[module/date]
#type = internal/date
#interval = 1
#date = %H:%M
#date-alt = %Y-%m-%d %H:%M:%S
#label = %date%
#label-foreground = ${colors.primary}

[module/cpu]
type = internal/cpu
interval = 2
format-prefix = "’ŗø "
format-prefix-foreground = ${colors.primary}
label = %percentage:2%%

[module/memory]
type = internal/memory
interval = 2

# Layout: Label first, then the bar
format = <label> <bar-used>

# The text label
label = "RAM "
label-foreground = ${colors.primary}

# The Bar Configuration
bar-used-width = 10
bar-used-gradient = true
bar-used-indicator = 
bar-used-fill = Ōöü
bar-used-empty = Ōöü
bar-used-empty-foreground = #414868

# Color gradient (Tokyo Night inspired)
# Blue (Normal) -> Orange (Warning) -> Red (Critical)
bar-used-foreground-0 = #7aa2f7
bar-used-foreground-1 = #ff9e64
bar-used-foreground-2 = #f7768e

[module/date]
type = internal/date
interval = 1
date = %H:%M
date-alt = %Y-%m-%d %H:%M:%S
format-prefix = "’ĆŚ "
format-prefix-foreground = ${colors.primary}
label = %date%

[module/gpu]
type = custom/script
exec = ~/.config/polybar/gpu-temp.sh
interval = 5
format-prefix = "GPU "
format-prefix-foreground = ${colors.primary}

[module/cpu-temp]
type = internal/temperature
interval = 1
thermal-zone = 0
warn-temperature = 70

format = <label>
format-prefix = "’ŗć "
format-prefix-foreground = ${colors.primary}
label = %temperature-c%

format-warn = <label-warn>
format-warn-prefix = "’ŗć "
format-warn-prefix-foreground = ${colors.alert}
label-warn = %temperature-c%
label-warn-foreground = ${colors.alert}

[module/pulseaudio]
type = internal/pulseaudio
# Use the mapped volume controls you set up in i3
use-ui-max = false
interval = 5

format-volume = <ramp-volume> <label-volume>
label-volume = %percentage%%

label-muted = ’Ü® muted
label-muted-foreground = ${colors.alert}

# Volume icons that change based on percentage
ramp-volume-0 = ’Ć”
ramp-volume-1 = ’Ć¦
ramp-volume-2 = ’Ć©
ramp-volume-foreground = ${colors.primary}

[module/filesystem]
type = internal/fs
interval = 30
mount-0 = /

format-mounted-prefix = "’éĀ "
format-mounted-prefix-foreground = ${colors.primary}
label-mounted = %free%

[module/suspend]
type = custom/text
content = " ’Ćæ"
content-foreground = ${colors.primary}
content-padding = 1

# The command that runs when you click it
click-left = systemctl suspend

[module/battery]
type = internal/battery
full-at = 99
low-at = 10

; Use your Acer's hardware names
battery = BAT1
adapter = ACAD

poll-interval = 5
time-format = %H:%M

; Add the Tokyo Night blue hex code to the icons
format-charging = <animation-charging> <label-charging>
format-discharging = %{F#7aa2f7}<ramp-capacity>%{F-} <label-discharging>
format-full = %{F#7aa2f7}<ramp-capacity>%{F-} Full

label-charging = %percentage%% (%time%)
label-discharging = %percentage%% (%time%)

; Icons with matching ramps
ramp-capacity-0 = ’ēä
ramp-capacity-1 = ’ēā
ramp-capacity-2 = ’ēé
ramp-capacity-3 = ’ēü
ramp-capacity-4 = ’ēĆ

animation-charging-0 = ’ēä
animation-charging-1 = ’ēā
animation-charging-2 = ’ēé
animation-charging-3 = ’ēü
animation-charging-4 = ’ēĆ
animation-charging-framerate = 750
